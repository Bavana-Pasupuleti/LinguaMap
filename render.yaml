services:
  - type: web
    name: linguamap
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node setup-db.js && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEWSAPI_KEY
        sync: false
      - key: MASTODON_ACCESS_TOKEN
        sync: false
      - key: MASTODON_INSTANCE_URL
        value: https://mastodon.social
