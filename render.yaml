services:
  - type: web
    name: linguamap-api
    env: node
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linguamap-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: linguamap-redis
          type: redis
          property: connectionString
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: MASTODON_ACCESS_TOKEN
        sync: false
      - key: NEWSAPI_KEY
        sync: false

  - type: web
    name: linguamap-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://linguamap-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: worker
    name: linguamap-pipeline
    env: python
    plan: starter
    buildCommand: cd pipeline && pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd pipeline && python -m pipeline.orchestrator
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linguamap-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: linguamap-redis
          type: redis
          property: connectionString

databases:
  - name: linguamap-db
    plan: starter
    postgresMajorVersion: 15
    ipAllowList: []
