services:
  - type: web
    name: linguamap
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEWSAPI_KEY
        sync: false
      - key: MASTODON_ACCESS_TOKEN
        sync: false
      - key: MASTODON_INSTANCE_URL
        value: https://mastodon.social
